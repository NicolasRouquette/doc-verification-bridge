name = "doc-verification-bridge"
version = "0.1.0"
keywords = ["documentation", "verification", "theorem-classification", "dependency-analysis"]
defaultTargets = ["DocVerificationBridge","unified-doc","unified-dep-table"]
leanVersion = "leanprover/lean4:v4.30.0-rc2"

[[lean_lib]]
name = "DependencyAnalysis"

[[lean_lib]]
name = "DocVerificationBridge"

# Smoke tests for `DependencyAnalysis.isAuxiliaryName` — locks in the
# exact-match, numbered-variant, and sub-helper-walk layers of the
# auxiliary-name filter. Run with: `lake build DependencyAnalysisTests`.
[[lean_lib]]
name = "DependencyAnalysisTests"
srcDir = "test"
roots = ["IsAuxiliaryNameTests"]

[[lean_exe]]
name = "unified-doc"
root = "Main"
supportInterpreter = true

[[lean_exe]]
name = "unified-dep-table"
root = "MainDepTable"
supportInterpreter = true

[[require]]
name = "doc-gen4"
git = "https://github.com/leanprover/doc-gen4"
rev = "v4.30.0-rc2"

[[require]]
name = "Cli"
git = "https://github.com/leanprover/lean4-cli"
rev = "v4.30.0-rc2"

# see https://crates.io/crates/lean-tui
[[require]]
name = "LeanPrism"
git = "https://codeberg.org/wvhulle/lean-prism.git"
rev = "main"
