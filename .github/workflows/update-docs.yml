name: Update Documentation

on:
  schedule:
    # Run daily at 2 AM PST (10 AM UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      projects:
        description: 'Projects to update (space-separated, empty for all)'
        required: false
        default: ''
      mode:
        description: 'Run mode'
        required: false
        default: '--update'
        type: choice
        options:
          - '--update'
          - '--html-only'
          - '--reanalyze'
          - '--reclassify'

jobs:
  update-docs:
    # Use self-hosted runner on your workstation
    # Falls back to ubuntu-latest if self-hosted unavailable
    runs-on: [self-hosted, linux, x64]
    
    # Required permissions for pushing to pages branch
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Don't run git clean - experiments/repos and experiments/sites are large
          # and should persist across runs for incremental updates
          clean: false
      
      - name: Ensure Elan is installed
        run: |
          if ! command -v elan &> /dev/null; then
            curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      
      - name: Ensure Git LFS is installed
        run: |
          if ! command -v git-lfs &> /dev/null; then
            echo "::error::Git LFS not found. Please install it on the self-hosted runner: sudo dnf install git-lfs"
            exit 1
          fi
          git lfs install
      
      - name: Pre-install required Lean toolchains
        run: |
          # Install doc-verification-bridge's toolchain (needed to build the pipeline itself)
          if [ -f lean-toolchain ]; then
            echo "Installing doc-verification-bridge toolchain: $(cat lean-toolchain)"
            elan toolchain install "$(cat lean-toolchain)" || true
          fi
          # Note: Project toolchains are now installed automatically by the experiments
          # pipeline during Phase 2 (after cloning, before building). This ensures all
          # toolchains are available even for newly cloned repos.
          elan show
      
      - name: Build doc-verification-bridge
        run: |
          cd Experiments
          lake build experiments
      
      - name: Run update pipeline
        run: |
          cd experiments
          PROJECTS="${{ github.event.inputs.projects }}"
          MODE="${{ github.event.inputs.mode || '--update' }}"
          if [ -n "$PROJECTS" ]; then
            ./run.sh run $MODE --projects $PROJECTS
          else
            ./run.sh run $MODE
          fi
        timeout-minutes: 1440  # 24 hours max for self-hosted
      
      - name: Publish site to pages branch
        env:
          # Publish to the github.com repo; GitHub Pages serves the `pages` branch.
          #
          # The site is published as a single orphan commit of PLAIN git blobs —
          # deliberately NO Git LFS. GitHub Pages serves LFS objects as broken
          # pointer stubs, and GitHub never garbage-collects unreferenced LFS
          # objects, so the previous `git lfs track "*.json"/"*.jsonl"/"*.sqlite"`
          # both broke the served JSON and grew this repo's LFS storage without
          # bound. scripts/publish-pages.sh instead excludes the regenerable
          # multi-hundred-MB artifacts (classification-cache.jsonl caches and the
          # api-temp/ doc-gen4 SQLite dirs) and builds the orphan in a throwaway
          # git dir so the runner's persistent .git never accumulates the site.
          PAGES_PUSH_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          PAGES_PUSH=1 PAGES_BRANCH=pages bash scripts/publish-pages.sh