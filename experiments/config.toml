# Experiment Configuration for doc-verification-bridge evaluation
# All project documentation is served from sites/ subdirectory

[settings]
# Relative to the experiments directory
# Note: With Phase 3 multi-version support, this path is primarily used for local development.
# In production, DocVerificationBridge is cloned from git at the version specified per-project.
doc_verification_bridge_path = "../DocVerificationBridge"
repos_dir = "repos"
sites_dir = "sites"
base_port = 9000
max_parallel_jobs = 8
slow_threshold_secs = 30

# External documentation URLs for transitive dependencies
#
# When doc-gen4 generates documentation, it creates navbar links to all imported modules,
# including transitive dependencies (e.g., Batteries, Aesop, Mathlib) that are not part of
# the project being documented. These links would otherwise be broken.
#
# This section maps module prefixes to external documentation base URLs. For each missing
# dependency page, we generate a redirect stub that sends users to the correct external docs.
#
# Format: ModulePrefix = "base_url"
# The module path (e.g., "Batteries/Data/List.html") is appended to the base URL.
[external_docs]
Lean = "https://leanprover-community.github.io/mathlib4_docs/"
Init = "https://leanprover-community.github.io/mathlib4_docs/"
Std = "https://leanprover-community.github.io/mathlib4_docs/"
Lake = "https://leanprover-community.github.io/mathlib4_docs/"
Batteries = "https://leanprover-community.github.io/mathlib4_docs/"
Aesop = "https://leanprover-community.github.io/aesop/docs/"
Mathlib = "https://leanprover-community.github.io/mathlib4_docs/"
Qq = "https://leanprover-community.github.io/mathlib4_docs/"
ImportGraph = "https://leanprover-community.github.io/mathlib4_docs/"
ProofWidgets = "https://leanprover-community.github.io/mathlib4_docs/"
Cli = "https://leanprover-community.github.io/mathlib4_docs/"
Plausible = "https://leanprover-community.github.io/mathlib4_docs/"

# Global defaults for settings that can be overridden per-project
# Note: use_doc_gen4_fork is deprecated - PR #344 merged to official doc-gen4
# Other global defaults (uncomment to change defaults):
# lake_exe_cache_get = false
# disable_equations = false
# skip_proof_deps = false
# proof_dep_workers = 0
# html_workers = 0
# slow_threshold_secs = 30  # Warn about theorems taking longer than this during proof dep extraction

# Projects to analyze
# Format: repo URL, top-level module(s), project description
#
# Optional fields (all can override global settings):
#   classification_mode: "auto" (default) or "annotated"
#     - auto: Use heuristic-based automatic classification
#     - annotated: Only classify declarations with @[api_*] annotations
#   subdirectory: path within repo to Lean project (for monorepos)
#   lake_exe_cache_get: true to run `lake exe cache get` before build (for mathlib4)
#   disable_equations: true to disable equation generation (avoids timeouts)
#   skip_proof_deps: true to skip proof dependency extraction (faster)
#   proof_dep_workers: number of parallel workers for proof dep extraction (0 = sequential)
#   proof_dep_blacklist: array of theorem names to skip during proof dep extraction (for slow theorems)
#   html_workers: number of parallel workers for HTML file writing (0 = sequential)
#   use_doc_gen4_fork: use doc-gen4 fork for bidirectional navigation

[[projects]]
name = "lean4-yaml-verified"
repo = "git@github.jpl.nasa.gov:pass/lean4-yaml-verified.git"
modules = ["Lean4Yaml"]
description = "A YAML 1.2.2 parser in Lean 4 with the goal of **verified correctness**"
docvb_version = "v4.28.0"
lake_exe_cache_get = false  # No mathlib dependency, cache not available
disable_equations = false
skip_proof_deps = false
proof_dep_workers = 50
html_workers = 20

[[projects]]
name = "contracts"
repo = "git@fornat1.jpl.nasa.gov:tlr/testing/contracts.git"
modules = ["AsyncDSLMath"]
description = "Async DSL Formalized"
docvb_version = "v4.28.0"
lake_exe_cache_get = true
disable_equations = false
skip_proof_deps = false
proof_dep_workers = 50
html_workers = 20

[[projects]]
name = "batteries"
repo = "https://github.com/leanprover-community/batteries"
modules = ["Batteries"]
description = "Standard library extensions for Lean 4"
docvb_version = "v4.29.0"

[[projects]]
name = "cslib"
repo = "https://github.com/leanprover/cslib"
modules = ["Cslib"]
description = "The Lean Computer Science Library (CSLib)"
docvb_version = "v4.29.0"

[[projects]]
name = "mathlib4"
repo = "https://github.com/leanprover-community/mathlib4"
modules = ["Mathlib"]
description = "Mathematical library for Lean 4"
docvb_version = "v4.29.0"
lake_exe_cache_get = true
disable_equations = true
skip_proof_deps = false
proof_dep_workers = 50
html_workers = 20
